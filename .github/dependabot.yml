version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "mtahle"
    allow:
      - dependency-type: all

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci):"
    labels:
      - "ci"
      - "github-actions"
    reviewers:
      - "mtahle"
